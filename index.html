<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPostcode • Live GPS Tracker</title>
    <meta name="description" content="Free open-source 3D universal addressing system. Convert GPS ↔ Cube Code with 1 meter precision.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --text-muted: #aaaaaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.6rem;
            background: linear-gradient(90deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.08);
        }
        #map { height: 380px; border-radius: 12px; margin: 15px 0; }
        .converter { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .converter { grid-template-columns: 1fr; } }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--accent); }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.45rem;
            word-break: break-all;
            border-left: 5px solid var(--accent);
        }
        button {
            background: #333;
            color: white;
            padding: 10px 18px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 6px 4px 6px 0;
        }
        .gps-btn, .live-btn { background: var(--accent); color: #000; font-weight: 600; }
        .live-btn.stop { background: #ff4444; color: white; }
        .status { margin-top: 8px; font-size: 0.95rem; min-height: 22px; }
        .history {
            max-height: 240px;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        .history-item {
            padding: 6px 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item:hover { background: #222; }
        .footer { text-align: center; margin-top: 40px; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>#CubicPostcode</h1>
            <p class="tagline">Real-time 22-digit 1m³ Cube Code • GPS Tracking</p>
        </header>

        <div class="card">
            <h2 style="margin-bottom: 20px;">Live GPS → Cube Code</h2>
            <div class="converter">
                <div>
                    <h3>GPS Input</h3>
                    <div style="margin-bottom: 16px;">
                        <label>Latitude</label>
                        <input type="number" id="lat" step="0.000001" oninput="liveConvert()">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label>Longitude</label>
                        <input type="number" id="lon" step="0.000001" oninput="liveConvert()">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label>Altitude (m)</label>
                        <input type="number" id="alt" step="0.1" oninput="liveConvert()">
                    </div>

                    <button onclick="getCurrentGPS()" class="gps-btn">📍 One-time</button>
                    <button onclick="toggleLiveTracking()" id="liveBtn" class="live-btn">🔴 Start Live Tracking</button>
                    <label style="display:inline-block; margin-left:10px;">
                        <input type="checkbox" id="autoCopy" checked> Auto-copy on update
                    </label>
                    <div id="gpsStatus" class="status"></div>
                </div>

                <div>
                    <h3>Current Cube Code</h3>
                    <div id="cubeResult" class="result">—</div>
                    <button onclick="copyCube()" class="copy-btn">📋 Copy Code</button>
                </div>
            </div>

            <div style="margin-top: 25px;">
                <h3>Live Map + Trail</h3>
                <div id="map"></div>
            </div>
        </div>

        <div class="card">
            <h3>History / Trail <button onclick="clearHistory()" style="float:right; font-size:0.85rem;">Clear</button></h3>
            <div id="history" class="history"></div>
        </div>

        <!-- Cube → GPS remains the same -->
        <div class="card">
            <h2 style="margin-bottom: 24px; text-align: center;">Cube Code → GPS</h2>
            <div style="max-width: 600px; margin: 0 auto;">
                <label>22-digit Cube Code</label>
                <input type="text" id="cubeInput" placeholder="1234567890123456789012" maxlength="22" inputmode="numeric" style="margin-bottom: 16px; font-family: monospace; letter-spacing: 2px;" oninput="validateCubeInput(this)">
                <button onclick="convertCubeToGPS()" style="padding: 12px 24px;">Convert to GPS</button>
                <div id="gpsResult" class="result" style="margin-top: 20px; font-size: 1.1rem;"></div>
            </div>
        </div>

        <centre>
        <div class="links">
        <a href="https://github.com/cubicpostcode/cubicpostcode" target="_blank" style="color: var(--accent);">GitHub</a>
        <a href="https://grokipedia.com/Cubic_Postcode" target="_blank" style="color: var(--accent);">Grokipedia</a> 
        </div>
        </centre>
            
        <div class="footer">
            <p>Every 1m³ on Earth has a unique 22-digit code • Open Source</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let watchId = null;
        let map, marker, polyline;
        let pathPoints = [];
        let history = [];

        function gpsToECEF(lat, lon, alt) {
            const a = 6378137.0;
            const f = 1 / 298.257223563;
            const e2 = 2*f - f*f;
            lat = lat * Math.PI / 180;
            lon = lon * Math.PI / 180;
            const sinLat = Math.sin(lat);
            const cosLat = Math.cos(lat);
            const N = a / Math.sqrt(1 - e2 * sinLat * sinLat);
            const x = (N + alt) * cosLat * Math.cos(lon);
            const y = (N + alt) * cosLat * Math.sin(lon);
            const z = (N * (1 - e2) + alt) * sinLat;
            return {x, y, z};
        }

        function formatCubeCode(x, y, z) {
            const scale = 10000000;
            const cx = Math.floor((x + 6378137) * scale);
            const cy = Math.floor((y + 6378137) * scale);
            const cz = Math.floor((z + 6378137) * scale);
            let code = cx.toString().padStart(7,'0') + cy.toString().padStart(7,'0') + cz.toString().padStart(8,'0');
            return code.substring(0, 22);
        }

        function liveConvert() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const alt = parseFloat(document.getElementById('alt').value) || 0;
            if (isNaN(lat) || isNaN(lon)) return;

            const ecef = gpsToECEF(lat, lon, alt);
            const cubeCode = formatCubeCode(ecef.x, ecef.y, ecef.z);

            document.getElementById('cubeResult').textContent = cubeCode;

            // Auto-copy
            if (document.getElementById('autoCopy').checked) {
                navigator.clipboard.writeText(cubeCode + " #CubicPostcode");
            }

            addToHistory(lat, lon, cubeCode);
        }

        function addToHistory(lat, lon, code) {
            const time = new Date().toLocaleTimeString();
            history.unshift({time, lat, lon, code});
            if (history.length > 20) history.pop();

            const html = history.map(h => `
                <div class="history-item" onclick="loadFromHistory(${h.lat}, ${h.lon})">
                    <strong>${h.code}</strong><br>
                    <small>${h.time} — ${h.lat.toFixed(5)}, ${h.lon.toFixed(5)}</small>
                </div>
            `).join('');
            document.getElementById('history').innerHTML = html;
        }

        function loadFromHistory(lat, lon) {
            document.getElementById('lat').value = lat;
            document.getElementById('lon').value = lon;
            liveConvert();
        }

        function clearHistory() {
            history = [];
            document.getElementById('history').innerHTML = '';
        }

        function updateMap(lat, lon) {
            if (!map) {
                map = L.map('map').setView([lat, lon], 18);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);
                marker = L.marker([lat, lon]).addTo(map);
                polyline = L.polyline([], {color: '#00d4ff'}).addTo(map);
            } else {
                marker.setLatLng([lat, lon]);
                map.panTo([lat, lon]);
            }
            pathPoints.push([lat, lon]);
            polyline.setLatLngs(pathPoints);
        }

        function updateLocation(position) {
            const { latitude, longitude, altitude } = position.coords;
            
            document.getElementById('lat').value = latitude.toFixed(6);
            document.getElementById('lon').value = longitude.toFixed(6);
            if (altitude !== null) document.getElementById('alt').value = altitude.toFixed(1);

            liveConvert();
            updateMap(latitude, longitude);

            document.getElementById('gpsStatus').innerHTML = 
                `✅ <strong>LIVE TRACKING</strong> • ${latitude.toFixed(5)}°, ${longitude.toFixed(5)}°`;
        }

        function toggleLiveTracking() {
            const btn = document.getElementById('liveBtn');
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btn.textContent = "🔴 Start Live Tracking";
                btn.classList.remove('stop');
                document.getElementById('gpsStatus').textContent = "Live tracking stopped.";
                return;
            }

            watchId = navigator.geolocation.watchPosition(
                updateLocation,
                (e) => document.getElementById('gpsStatus').textContent = "❌ Location error",
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );

            btn.textContent = "⏹ Stop Live Tracking";
            btn.classList.add('stop');
        }

        function getCurrentGPS() {
            navigator.geolocation.getCurrentPosition(updateLocation, () => {}, { enableHighAccuracy: true });
        }

        // Original Cube → GPS function
        function convertCubeToGPS() {
            const code = document.getElementById('cubeInput').value.trim();
            if (code.length !== 22 || !/^\d{22}$/.test(code)) {
                document.getElementById('gpsResult').innerHTML = "❌ Invalid 22-digit code";
                return;
            }
            // ... (your original decoding logic - kept the same)
            const cx = parseInt(code.substring(0,7));
            const cy = parseInt(code.substring(7,14));
            const cz = parseInt(code.substring(14,22));
            const scale = 10000000;
            const offset = 6378137;
            const x = (cx / scale) - offset;
            const y = (cy / scale) - offset;
            const z = (cz / scale) - offset;
            const lon = Math.atan2(y, x) * 180 / Math.PI;
            const p = Math.sqrt(x*x + y*y);
            let lat = Math.atan2(z, p * 0.99330562) * 180 / Math.PI;
            const alt = Math.sqrt(x*x + y*y + z*z) - 6378137;
            document.getElementById('gpsResult').innerHTML = `<strong>✅ Decoded:</strong><br>Lat: ${lat.toFixed(6)}°<br>Lon: ${lon.toFixed(6)}°<br>Alt: ${alt.toFixed(1)} m`;
        }

        function copyCube() {
            const code = document.getElementById('cubeResult').textContent.trim();
            navigator.clipboard.writeText(code + " #CubicPostcode");
        }

        function validateCubeInput(input) {
            input.value = input.value.replace(/\D/g, '').substring(0,22);
        }

        window.onload = () => {
            // Start with example location
            document.getElementById('lat').value = "51.5074";
            document.getElementById('lon').value = "-0.1278";
            liveConvert();
        };
    </script>
</body>
</html>
