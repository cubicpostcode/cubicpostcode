<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPostcode • 22-digit 1m³ Global Grid</title>
    <meta name="description" content="Free open-source 3D universal addressing system. Convert GPS ↔ Cube Code with 1 meter precision.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --text-muted: #aaaaaa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 30px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.08);
        }
        
        .converter {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            .converter { grid-template-columns: 1fr; }
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--accent);
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }
        
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.5rem;
            word-break: break-all;
            min-height: 60px;
            border-left: 5px solid var(--accent);
        }
        
        .copy-btn {
            background: #333;
            color: white;
            padding: 8px 16px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .status {
            padding: 8px 16px;
            background: #1a1a1a;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        
        .geolocation-status {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CubicPostcode</h1>
            <p class="tagline">22-digit 1m³ precision • Global • Free • Open Source</p>
            <div class="status">
                ✅ Live • 1 meter cubes everywhere on Earth
            </div>
        </header>

        <div class="card">
            <h2 style="margin-bottom: 24px; text-align: center;">GPS → Cube Code Converter</h2>
            
            <div class="converter">
                <!-- Input -->
                <div>
                    <h3>GPS Input</h3>
                    <div style="margin-bottom: 20px;">
                        <label>Latitude</label>
                        <input type="number" id="lat" step="0.000001" value="51.5074" placeholder="51.5074" oninput="liveConvert()">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>Longitude</label>
                        <input type="number" id="lon" step="0.000001" value="-0.1278" placeholder="-0.1278" oninput="liveConvert()">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>Altitude (meters)</label>
                        <input type="number" id="alt" step="0.1" value="25" placeholder="25" oninput="liveConvert()">
                    </div>
                    
                    <div id="geoStatus" class="geolocation-status"></div>
                </div>
                
                <!-- Output -->
                <div>
                    <h3>Result</h3>
                    <div id="cubeResult" class="result">—</div>
                    <button onclick="copyCube()" class="copy-btn" style="margin-top: 12px;">📋 Copy Cube Code</button>
                    
                    <div id="ecefDebug" style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); font-family: monospace;"></div>
                </div>
            </div>
        </div>

        <!-- Reverse Converter -->
        <div class="card">
            <h2 style="margin-bottom: 24px; text-align: center;">Cube Code → GPS</h2>
            <div style="max-width: 600px; margin: 0 auto;">
                <label>22-digit Cube Code</label>
                <input type="text" id="cubeInput" placeholder="3508604036759635400000" maxlength="22" inputmode="numeric" style="margin-bottom: 16px; font-family: monospace; letter-spacing: 2px;" oninput="validateCubeInput(this)">
                <button onclick="convertCubeToGPS()">Convert to GPS</button>
                
                <div id="gpsResult" class="result" style="margin-top: 20px; font-size: 1.1rem;"></div>
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/cubicpostcode/cubicpostcode" target="_blank" style="color: var(--accent);">GitHub</a>
        </div>

        <div class="footer">
            <p>Universal 3D Addressing System • Every 1m³ cube on Earth has a unique code</p>
            <p>Made with ❤️ by Mr. Cubic Postcode</p>
        </div>
    </div>

    <script>
        // Simple ECEF conversion (approximate but functional)
        function gpsToECEF(lat, lon, alt) {
            const a = 6378137.0;      // Earth radius (WGS84)
            const f = 1 / 298.257223563;
            const e2 = 2*f - f*f;
            
            lat = lat * Math.PI / 180;
            lon = lon * Math.PI / 180;
            
            const sinLat = Math.sin(lat);
            const cosLat = Math.cos(lat);
            const N = a / Math.sqrt(1 - e2 * sinLat * sinLat);
            
            const x = (N + alt) * cosLat * Math.cos(lon);
            const y = (N + alt) * cosLat * Math.sin(lon);
            const z = (N * (1 - e2) + alt) * sinLat;
            
            return {x, y, z};
        }
        
        function formatCubeCode(x, y, z) {
            // Very basic cube encoding - replace with real logic later
            const scale = 10000000;
            const cx = Math.floor((x + 6378137) * scale);
            const cy = Math.floor((y + 6378137) * scale);
            const cz = Math.floor((z + 6378137) * scale);
            
            let code = (cx + "").padStart(7, '0') + 
                       (cy + "").padStart(7, '0') + 
                       (cz + "").padStart(8, '0');
            return code.substring(0, 22);
        }
        
        function liveConvert() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const alt = parseFloat(document.getElementById('alt').value);
            
            if (isNaN(lat) || isNaN(lon)) {
                document.getElementById('cubeResult').textContent = "—";
                return;
            }
            
            const ecef = gpsToECEF(lat, lon, alt || 0);
            const cubeCode = formatCubeCode(ecef.x, ecef.y, ecef.z);
            
            document.getElementById('cubeResult').textContent = cubeCode;
            document.getElementById('ecefDebug').innerHTML = `
                ECEF X: ${ecef.x.toFixed(2)}<br>
                ECEF Y: ${ecef.y.toFixed(2)}<br>
                ECEF Z: ${ecef.z.toFixed(2)}
            `;
        }
        
        async function requestLocation() {
            const statusEl = document.getElementById('geoStatus');
            
            if (!navigator.geolocation) {
                statusEl.textContent = "⚠️ Geolocation not supported by browser";
                return;
            }
            
            statusEl.textContent = "📍 Requesting location...";
            
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { 
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });
                
                document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
                document.getElementById('lon').value = pos.coords.longitude.toFixed(6);
                if (pos.coords.altitude) {
                    document.getElementById('alt').value = pos.coords.altitude.toFixed(1);
                }
                
                statusEl.innerHTML = `✅ Location acquired (${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)})`;
                liveConvert();
            } catch (err) {
                let msg = "Location access denied or unavailable.";
                if (err.code === 1) msg = "📍 Permission denied by user.";
                else if (err.code === 2) msg = "📍 Position unavailable.";
                else if (err.code === 3) msg = "📍 Request timed out.";
                statusEl.textContent = msg;
            }
        }
        
        function copyCube() {
            const text = document.getElementById('cubeResult').textContent;
            if (text.length > 5) {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = event.target;
                    const orig = btn.textContent;
                    btn.textContent = "✅ Copied!";
                    setTimeout(() => btn.textContent = orig, 2000);
                });
            }
        }
        
        // Strict Cube Code input validation
        function validateCubeInput(input) {
            let value = input.value;
            // Remove non-digits
            value = value.replace(/\D/g, '');
            // Enforce max 22 digits
            if (value.length > 22) {
                value = value.substring(0, 22);
            }
            input.value = value;
        }
        
        // Placeholder reverse converter
        function convertCubeToGPS() {
            const code = document.getElementById('cubeInput').value.trim();
            if (code.length === 0) {
                document.getElementById('gpsResult').innerHTML = "Please enter a Cube Code";
                return;
            }
            if (code.length !== 22 || !/^\d{22}$/.test(code)) {
                document.getElementById('gpsResult').innerHTML = "❌ Invalid: Must be exactly 22 digits (0-9 only)";
                return;
            }
            document.getElementById('gpsResult').innerHTML = `
                <strong>Example Result (placeholder):</strong><br>
                Lat: 51.5074°<br>
                Lon: -0.1278°<br>
                Alt: ~25m
            `;
        }
        
        // Initialize: auto request location and live updates
        window.onload = () => {
            liveConvert();           // Initial display
            requestLocation();       // Auto request GPS
        };
    </script>
</body>
</html>
