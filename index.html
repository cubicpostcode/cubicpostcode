<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPostcode • 22-digit 1m³ Global Grid</title>
    <meta name="description" content="Free open-source 3D universal addressing system. Convert GPS ↔ Cube Code with 1 meter precision.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --accent: #00d4ff;
            --text: #e0e0e0;
            --text-muted: #aaaaaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 30px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.08);
        }
        .converter { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .converter { grid-template-columns: 1fr; } }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--accent); }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.5rem;
            word-break: break-all;
            min-height: 60px;
            border-left: 5px solid var(--accent);
        }
        .copy-btn, .gps-btn {
            background: #333;
            color: white;
            padding: 8px 16px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
        }
        .gps-btn {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .status { margin-top: 10px; font-size: 0.95rem; color: var(--text-muted); }
        .footer { text-align: center; margin-top: 60px; color: var(--text-muted); font-size: 0.95rem; }
        .links { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>#CubicPostcode</h1>
            <p class="tagline">22-digit 1m³ precision • Global • Free • Open Source</p>
        </header>

        <!-- GPS → Cube -->
        <div class="card">
            <h2 style="margin-bottom: 24px; text-align: center;">GPS → Cube Code</h2>
            <div class="converter">
                <div>
                    <h3>GPS Input</h3>
                    <div style="margin-bottom: 20px;">
                        <label>Latitude</label>
                        <input type="number" id="lat" step="0.000001" value="51.5074" oninput="liveConvert()">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>Longitude</label>
                        <input type="number" id="lon" step="0.000001" value="-0.1278" oninput="liveConvert()">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>Altitude (meters)</label>
                        <input type="number" id="alt" step="0.1" value="25" oninput="liveConvert()">
                    </div>
                    
                    <button onclick="getCurrentGPS()" class="gps-btn">📍 Use My Current Location (GPS)</button>
                    <div id="gpsStatus" class="status"></div>
                </div>
                <div>
                    <h3>Result</h3>
                    <div id="cubeResult" class="result">—</div>
                    <button onclick="copyCube()" class="copy-btn">📋 Copy Cube Code</button>
                </div>
            </div>
        </div>

        <!-- Cube → GPS -->
        <div class="card">
            <h2 style="margin-bottom: 24px; text-align: center;">Cube Code → GPS</h2>
            <div style="max-width: 600px; margin: 0 auto;">
                <label>22-digit Cube Code</label>
                <input type="text" id="cubeInput" placeholder="1234567890123456789012" maxlength="22" inputmode="numeric" style="margin-bottom: 16px; font-family: monospace; letter-spacing: 2px;" oninput="validateCubeInput(this)">
                <button onclick="convertCubeToGPS()" style="padding: 12px 24px; font-size: 1rem;">Convert to GPS</button>
                <div id="gpsResult" class="result" style="margin-top: 20px; font-size: 1.1rem;"></div>
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/cubicpostcode/cubicpostcode" target="_blank" style="color: var(--accent);">GitHub</a>
            <a href="https://grokipedia.com/Cubic_Postcode" target="_blank" style="color: var(--accent);">Grokipedia</a>
        </div>
        <div class="footer">
            <p>Universal 3D Addressing System • Every 1m³ cube on Earth has a unique code</p>
            <p>Made with ❤️ by Mr. Cubic Postcode</p>
        </div>
    </div>

    <script>
        function gpsToECEF(lat, lon, alt) {
            const a = 6378137.0;
            const f = 1 / 298.257223563;
            const e2 = 2*f - f*f;
            lat = lat * Math.PI / 180;
            lon = lon * Math.PI / 180;
            const sinLat = Math.sin(lat);
            const cosLat = Math.cos(lat);
            const N = a / Math.sqrt(1 - e2 * sinLat * sinLat);
            const x = (N + alt) * cosLat * Math.cos(lon);
            const y = (N + alt) * cosLat * Math.sin(lon);
            const z = (N * (1 - e2) + alt) * sinLat;
            return {x, y, z};
        }

        function formatCubeCode(x, y, z) {
            const scale = 10000000;
            const cx = Math.floor((x + 6378137) * scale);
            const cy = Math.floor((y + 6378137) * scale);
            const cz = Math.floor((z + 6378137) * scale);
            let code = cx.toString().padStart(7, '0') + cy.toString().padStart(7, '0') + cz.toString().padStart(8, '0');
            return code.substring(0, 22);
        }

        function liveConvert() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const alt = parseFloat(document.getElementById('alt').value) || 0;
            if (isNaN(lat) || isNaN(lon)) {
                document.getElementById('cubeResult').textContent = "—";
                return;
            }
            const ecef = gpsToECEF(lat, lon, alt);
            const cubeCode = formatCubeCode(ecef.x, ecef.y, ecef.z);
            document.getElementById('cubeResult').textContent = cubeCode;
        }

        function getCurrentGPS() {
            const status = document.getElementById('gpsStatus');
            status.textContent = "📍 Getting location... (this may take a few seconds)";
            status.style.color = "var(--accent)";

            if (!navigator.geolocation) {
                status.textContent = "❌ Geolocation is not supported by this browser.";
                status.style.color = "red";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude, altitude } = position.coords;
                    
                    document.getElementById('lat').value = latitude.toFixed(6);
                    document.getElementById('lon').value = longitude.toFixed(6);
                    
                    // Altitude is often null or inaccurate on desktop, but we try
                    if (altitude !== null) {
                        document.getElementById('alt').value = altitude.toFixed(1);
                    } else {
                        // Optional: try to estimate or leave as is
                        document.getElementById('alt').value = "0";
                    }

                    liveConvert();
                    status.textContent = `✅ Location acquired: ${latitude.toFixed(4)}°, ${longitude.toFixed(4)}°`;
                    status.style.color = "#4ade80";
                },
                (error) => {
                    let message = "❌ Unknown error";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message = "❌ Permission denied. Please allow location access.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = "❌ Location information unavailable.";
                            break;
                        case error.TIMEOUT:
                            message = "❌ Location request timed out.";
                            break;
                    }
                    status.textContent = message;
                    status.style.color = "red";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // Rest of your original functions (unchanged)
        function convertCubeToGPS() { /* ... your original function ... */ }
        function copyCube() { /* ... your original function ... */ }
        function validateCubeInput(input) { /* ... your original function ... */ }

        window.onload = () => {
            liveConvert();
        };
    </script>
</body>
</html>
