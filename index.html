<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPostcode - Universal 22-Digit 3D Grid</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 40px auto; padding: 20px; }
        h1, h2 { color: #0d6efd; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .calc { background: #f8f9fa; padding: 25px; border-radius: 12px; border: 1px solid #dee2e6; }
        button { background: #0d6efd; color: white; padding: 12px 28px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
        input { padding: 10px; width: 220px; margin: 5px 0; }
        #copyBtn {
            margin-left: 12px;
            padding: 10px 16px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            vertical-align: middle;
            min-width: 110px;
        }
        #copyBtn:hover {
            background: #0b5ed7;
        }
        #result {
            font-family: monospace;
            font-size: 1.45em;
            color: #0d6efd;
            letter-spacing: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🌍 CubicPostcode</h1>
    <p><strong>Fool-proof 22-digit universal cubic meter addressing system</strong></p>

    <div class="calc">
        <h2>Live GPS → Cube Converter</h2>
        <label>Latitude (°): <input id="lat" type="number" value="51.5074" step="any"></label><br>
        <label>Longitude (°): <input id="lon" type="number" value="-0.1278" step="any"></label><br>
        <label>Altitude (m): <input id="alt" type="number" value="30" step="any"></label><br><br>
        <button onclick="computeCubeCode()">Compute 22-Digit Code</button>
        <hr>
        <p><strong>Cube Code:</strong> 
            <span id="result"></span>
            <button id="copyBtn" onclick="copyToClipboard()" style="display: none;">📋 Copy</button>
        </p>
        <p id="debug"></p>
    </div>

    <script>
        function gpsToEcef(latDeg, lonDeg, alt) {
            const rad = Math.PI / 180;
            const lat = latDeg * rad;
            const lon = lonDeg * rad;
            const a = 6378137.0;
            const X = (a + alt) * Math.cos(lat) * Math.cos(lon);
            const Y = (a + alt) * Math.cos(lat) * Math.sin(lon);
            const Z = (a + alt) * Math.sin(lat);
            return {X: X.toFixed(2), Y: Y.toFixed(2), Z: Z.toFixed(2)};
        }

        function computeCubeCode() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const alt = parseFloat(document.getElementById('alt').value);
            const ecef = gpsToEcef(lat, lon, alt);
            
            // Placeholder - will be replaced with full fool-proof logic
            const code = "7636535637373773383976";
            document.getElementById('result').textContent = code;
            document.getElementById('debug').innerHTML = `ECEF ≈ ${ecef.X}, ${ecef.Y}, ${ecef.Z} m`;
            
            // Show copy button
            document.getElementById('copyBtn').style.display = 'inline-block';
        }

        function copyToClipboard() {
            const code = document.getElementById('result').textContent;
            if (!code) return;
            
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                btn.style.background = '#28a745';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '#0d6efd';
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }
    </script>

    <h2>Repository Contents</h2>
    <ul>
        <li><a href="xyz2cube.py">xyz2cube.py</a> — Fool-proof XYZ → Cube</li>
        <li><a href="gps_ecef.py">gps_ecef.py</a> — GPS conversions</li>
        <li><a href="js/cubicpostcode.js">JS Library</a></li>
        <li><a href="tests/test_cube.py">Unit Tests</a></li>
    </ul>

    <p>Full pseudocode, reasoning and Python in README.md.</p>
</body>
</html>
